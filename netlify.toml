[build]
  command = "vite build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22"
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY"


[functions]
  directory = "netlify/api-functions"
  node_bundler = "esbuild"

[functions."compare-quotes"]
  timeout = 120

[[redirects]]
  from = "https://pro.adlerrochefort.com/admin"
  to = "https://admin.adlerrochefort.com"
  status = 301
  force = true

[[redirects]]
  from = "https://pro.adlerrochefort.com/admin/*"
  to = "https://admin.adlerrochefort.com"
  status = 301
  force = true

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888
