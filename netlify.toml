[build]
  command = "vite build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22"
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY"


[functions]
  directory = "netlify/api-functions"
  node_bundler = "esbuild"

[functions."compare-quotes"]
  timeout = 120

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888
