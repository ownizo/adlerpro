[build]
  command = "vite build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22"
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL"

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888

[functions]
  directory = "netlify/functions"

# Admin role checks are handled in the app via Supabase auth
